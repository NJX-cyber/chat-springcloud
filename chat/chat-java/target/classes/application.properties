#应用服务器 WEB 访问端口
server.port=8088
#websorcket端口
ws.port=5051
server.servlet.context-path=/api
#session过期时间 60M 1小时
server.servlet.session.timeout=PT60M
#处理favicon
spring.mvc.favicon.enable=false
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
#错误页处理
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
#数据库配置
#修正后的完整URL（兼容MySQL 5.x/8.x，支持emoji，解决SSL告警，优化性能）
spring.datasource.url=jdbc:mysql://localhost:3306/chat?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=niejiaxin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=ChatDB-HikariPool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1
#spring redis配置
#Redis数据库索引（默认为0）
spring.redis.database=0
spring.redis.host=127.0.0.1
spring.redis.port=6379
#连接池最大连接数（负值表示没有限制）
spring.redis.jedis.pool.max-active=20
#连接池最大阻塞时间（负值表示没有限制）
spring.redis.jedis.pool.max-wait=-1
#连接池中最大空闲连接
spring.redis.jedis.pool.max-idle=10
#连接池中最小空闲连接
spring.redis.jedis.pool.min-idle=0
#连接超时时间（毫秒）
spring.redis.timeout=2000
#项目目录
project.folder=D:/develop/IDEA/JavaProject/chat/chat-java/
#日志级别配置
log.root.level=debug
#超级管理员ID
admin.emails=test@qq.com
#是否为开发环境
dev=false