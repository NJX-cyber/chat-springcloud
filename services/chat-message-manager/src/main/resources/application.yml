# 应用服务器 WEB 访问端口
server:
  port: 8089
  servlet:
    # session过期时间 60M 1小时
    session:
      timeout: PT60M

# websocket端口
ws:
  port: 5051

spring:
  application:
    name: chat-message-manager
  mvc:
    # 处理favicon
    favicon:
      enable: false
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  profiles:
    active: test
    include: feign
  cloud:
    nacos:
      discovery:
        server-addr: 43.108.55.149:8848
      config:
        server-addr: 43.108.55.149:8848
        namespace: ${spring.profiles.active:public}

  data:
    redis:
      database: 0
      host: 43.108.55.149
      port: 6379
      password: ${password}
      timeout: 8000ms
      connect-timeout: 8000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 1
          max-wait: 5000ms
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/chat?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&zeroDateTimeBehavior=convertToNull
    username: root
    password: ${password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ChatDB-HikariPool
      minimum-idle: 5
      idle-timeout: 180000
      maximum-pool-size: 10
      auto-commit: true
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

# ===== Resilience4j 韧性防护 =====
resilience4j:
  circuitbreaker:
    instances:
      cb-comm:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      llm-chat:
        timeout-duration: 30s
  # 限流配置
  ratelimiter:
    instances:
      lim-comm:
        limit-for-period: 10                # 每周期允许 10 个请求
        limit-refresh-period: 1s            # 周期为 1 秒
        timeout-duration: 0ms               # 不等待，限流即拒绝


# 项目目录
project:
  folder: D:\devplop\IDEA\Idea_Project\chat-springcloud\services\chat-message-manager


# 日志级别配置
logging:
  level:
    root: info
    com.example.messagemanager: info
    com.example.model: info

---
spring:
  config:
    import: optional:nacos:common.properties?group=chat-agent
    activate:
      on-profile: dev

---

spring:
  config:
    import: optional:nacos:common.properties?group=chat-agent
    activate:
      on-profile: test

---

spring:
  config:
    import: optional:nacos:common.properties?group=chat-agent
    activate:
      on-profile: prod
