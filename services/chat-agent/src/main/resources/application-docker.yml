# ===== Docker 环境覆盖配置 =====
spring:
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
      config:
        server-addr: nacos:8848
        import-check:
          enabled: false
  config:
    import: optional:nacos:common.properties?group=chat-agent
  datasource:
    url: jdbc:mysql://mysql:3306/chat?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&zeroDateTimeBehavior=convertToNull
  data:
    mongodb:
      uri: mongodb://admin:${password}@mongo:27017/chat_memory_db?authSource=admin&maxIdleTimeMS=20000&socketTimeoutMS=60000&maxPoolSize=20&minPoolSize=1
    redis:
      host: redis
      port: 6379
      password: ${password}
      timeout: 8000ms
      connect-timeout: 8000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 1
          max-wait: 5000ms

langchain4j:
  community:
    dashscope:
      chat-model:
        api-key: ${ALI_QWEN_API}
      embedding-model:
        api-key: ${ALI_QWEN_API}
      streaming-chat-model:
        api-key: ${ALI_QWEN_API}
    redis:
      host: redis
      port: 6379
      password: ${password}
